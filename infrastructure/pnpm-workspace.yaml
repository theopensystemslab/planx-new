packages:
  - application
  - certificates
  - common
  - data
  - ml
  - networking

allowBuilds:
  '@pulumi/aws': true
  '@pulumi/cloudflare': true
  '@pulumi/docker': true
  '@pulumi/docker-build': true
  aws-sdk: true
  protobufjs: true
  tldjs: true

catalog:
  '@pulumi/aws': ^7.31.0
  '@pulumi/awsx': ^3.4.0
  '@pulumi/cloudflare': ^6.17.0
  '@pulumi/postgresql': ^3.17.0
  '@pulumi/pulumi': ^3.243.0
  '@types/node': ~24.10.15
  typescript: ~5.9.3

minimumReleaseAge: 10080

savePrefix: '~'

strictPeerDependencies: true
