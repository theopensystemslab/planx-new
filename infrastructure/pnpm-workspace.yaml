packages:
  - application
  - certificates
  - common
  - data
  - ml
  - networking

allowBuilds:
  '@pulumi/aws': true
  '@pulumi/cloudflare': true
  '@pulumi/docker': true
  '@pulumi/docker-build': true
  aws-sdk: true
  protobufjs: true
  tldjs: true

catalog:
  '@pulumi/aws': ~7.23.0
  '@pulumi/awsx': ~3.3.1
  '@pulumi/cloudflare': ~6.13.1
  '@pulumi/postgresql': ~3.16.2
  '@pulumi/pulumi': ~3.228.0
  '@types/node': ~24.10.15
  typescript: ~5.9.3

minimumReleaseAge: 10080

overrides:
  fast-xml-parser: ^5.4.1
  tar@<=7.5.10: '>=7.5.11'
  tar@<=7.5.9: '>=7.5.10'

savePrefix: '~'

strictPeerDependencies: true