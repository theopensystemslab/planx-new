table:
  name: notifications
  schema: public
object_relationships:
  - name: flow
    using:
      manual_configuration:
        column_mapping:
          flow_id: id
        insertion_order: null
        remote_table:
          name: flows
          schema: public
  - name: notification_type_enum
    using:
      foreign_key_constraint_on: type
  - name: resolved_by_user
    using:
      foreign_key_constraint_on: resolved_by
  - name: team
    using:
      manual_configuration:
        column_mapping:
          team_id: id
        insertion_order: null
        remote_table:
          name: teams
          schema: public
  - name: user
    using:
      manual_configuration:
        column_mapping:
          resolved_by: id
        insertion_order: null
        remote_table:
          name: users
          schema: public
insert_permissions:
  - role: api
    permission:
      check: {}
      columns:
        - id
        - resolved_by
        - team_id
        - type
        - created_at
        - resolved_at
        - resolved_by
        - flow_id
    comment: ""
select_permissions:
  - role: api
    permission:
      columns:
        - id
        - resolved_by
        - team_id
        - type
        - created_at
        - resolved_at
        - resolved_by
        - flow_id
      filter: {}
    comment: ""
  - role: platformAdmin
    permission:
      columns:
        - id
        - resolved_by
        - team_id
        - type
        - created_at
        - resolved_at
        - resolved_by
        - flow_id
      filter: {}
    comment: ""
  - role: teamEditor
    permission:
      columns:
        - id
        - resolved_by
        - team_id
        - type
        - created_at
        - resolved_at
        - resolved_by
        - flow_id
      filter:
        team:
          members:
            _and:
              - user_id:
                  _eq: x-hasura-user-id
              - role:
                  _eq: teamEditor
    comment: ""
update_permissions:
  - role: api
    permission:
      columns:
        - id
        - resolved_by
        - team_id
        - type
        - created_at
        - resolved_at
        - resolved_by
        - flow_id
      filter: {}
      check: {}
    comment: ""
