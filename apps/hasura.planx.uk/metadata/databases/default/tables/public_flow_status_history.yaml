table:
  name: flow_status_history
  schema: public
object_relationships:
  - name: flow
    using:
      foreign_key_constraint_on: flow_id
select_permissions:
  - role: analyst
    permission:
      columns:
        - flow_id
        - status
      filter: {}
    comment: ""
  - role: demoUser
    permission:
      columns:
        - flow_id
        - status
      filter:
        flow:
          creator_id:
            _eq: x-hasura-user-id
    comment: Demo users can only see the status history of their own flows
  - role: platformAdmin
    permission:
      columns:
        - flow_id
        - status
      filter: {}
    comment: ""
  - role: teamEditor
    permission:
      columns:
        - flow_id
        - status
      filter: {}
    comment: ""
