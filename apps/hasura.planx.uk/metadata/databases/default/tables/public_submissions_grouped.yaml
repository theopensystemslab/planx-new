table:
  name: submissions_grouped
  schema: public
object_relationships:
  - name: team
    using:
      manual_configuration:
        column_mapping:
          team_id: id
        insertion_order: null
        remote_table:
          name: teams
          schema: public
select_permissions:
  - role: platformAdmin
    permission:
      columns:
        - team_id
        - address
        - event_type
        - flow_name
        - status
        - created_at
        - flow_id
        - session_id
      filter: {}
    comment: ""
  - role: teamEditor
    permission:
      columns:
        - team_id
        - address
        - event_type
        - flow_name
        - status
        - created_at
        - flow_id
        - session_id
      filter:
        team:
          members:
            _and:
              - user_id:
                  _eq: x-hasura-user-id
              - role:
                  _eq: teamEditor
    comment: ""
