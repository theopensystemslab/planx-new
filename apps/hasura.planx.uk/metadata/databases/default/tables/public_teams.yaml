table:
  name: teams
  schema: public
object_relationships:
  - name: integrations
    using:
      foreign_key_constraint_on:
        column: team_id
        table:
          name: team_integrations
          schema: public
  - name: team_settings
    using:
      foreign_key_constraint_on:
        column: team_id
        table:
          name: team_settings
          schema: public
  - name: theme
    using:
      foreign_key_constraint_on:
        column: team_id
        table:
          name: team_themes
          schema: public
array_relationships:
  - name: flows
    using:
      foreign_key_constraint_on:
        column: team_id
        table:
          name: flows
          schema: public
  - name: members
    using:
      foreign_key_constraint_on:
        column: team_id
        table:
          name: team_members
          schema: public
insert_permissions:
  - role: platformAdmin
    permission:
      check: {}
      columns:
        - created_at
        - domain
        - id
        - name
        - slug
        - updated_at
select_permissions:
  - role: analyst
    permission:
      columns:
        - id
        - domain
        - name
        - slug
        - created_at
        - updated_at
      filter: {}
    comment: ""
  - role: api
    permission:
      columns:
        - created_at
        - domain
        - id
        - name
        - slug
        - updated_at
      filter: {}
  - role: platformAdmin
    permission:
      columns:
        - created_at
        - domain
        - id
        - name
        - slug
        - updated_at
      filter: {}
  - role: public
    permission:
      columns:
        - created_at
        - domain
        - id
        - name
        - slug
        - updated_at
      filter: {}
  - role: teamEditor
    permission:
      columns:
        - created_at
        - domain
        - id
        - name
        - slug
        - updated_at
      filter: {}
update_permissions:
  - role: api
    permission:
      columns: []
      filter: {}
      check: {}
    comment: ""
  - role: platformAdmin
    permission:
      columns:
        - domain
        - name
        - slug
      filter: {}
      check: null
