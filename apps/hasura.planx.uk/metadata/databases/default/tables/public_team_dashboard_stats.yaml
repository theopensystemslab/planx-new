    permission:
      columns:
        - team_id
        - team_slug
        - sessions_current
        - sessions_previous
        - submissions_current
        - submissions_previous
        - guidance_sessions_current
        - guidance_sessions_previous
        - online_flows
        - online_flows_previous
      filter: {}
    comment: ""
  - role: teamEditor
    permission:
      columns:
        - team_id
        - team_slug
        - sessions_current
        - sessions_previous
        - submissions_current
        - submissions_previous
        - guidance_sessions_current
        - guidance_sessions_previous
        - online_flows
        - online_flows_previous
