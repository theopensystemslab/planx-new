table:
  name: team_dashboard_stats
  schema: public
object_relationships:
  - name: team
    using:
      manual_configuration:
        column_mapping:
          team_slug: slug
        insertion_order: null
        remote_table:
          name: teams
          schema: public
select_permissions:
  - role: analyst
    permission:
      columns:
        - team_id
        - team_slug
        - sessions_current
        - sessions_previous
        - submissions_current
        - submissions_previous
        - guidance_sessions_current
        - guidance_sessions_previous
        - online_flows
        - online_flows_previous
      filter: {}
    comment: ""
