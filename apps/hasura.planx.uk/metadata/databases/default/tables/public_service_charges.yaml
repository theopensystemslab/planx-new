table:
  name: service_charges
  schema: public
object_relationships:
  - name: team
    using:
      manual_configuration:
        column_mapping:
          team_slug: slug
        insertion_order: null
        remote_table:
          name: teams
          schema: public
select_permissions:
  - role: platformAdmin
    permission:
      columns:
        - fiscal_year
        - fiscal_year_quarter
        - month
        - service_charge_amount
        - flow_name
        - flow_slug
        - month_text
        - payment_id
        - team_slug
        - paid_at
        - session_id
      filter: {}
    comment: ""
  - role: teamEditor
    permission:
      columns:
        - fiscal_year
        - fiscal_year_quarter
        - month
        - service_charge_amount
        - flow_name
        - flow_slug
        - month_text
        - payment_id
        - team_slug
        - paid_at
        - session_id
      filter:
        team:
          members:
            _and:
              - user_id:
                  _eq: x-hasura-user-id
              - role:
                  _eq: teamEditor
    comment: ""
