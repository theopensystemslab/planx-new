table:
  name: user_pinned_flows
  schema: public
object_relationships:
  - name: flow
    using:
      foreign_key_constraint_on: flow_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: platformAdmin
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - user_id
        - created_at
        - updated_at
        - flow_id
    comment: ""
  - role: teamEditor
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - created_at
        - flow_id
        - updated_at
        - user_id
    comment: ""
select_permissions:
  - role: analyst
    permission:
      columns:
        - user_id
        - created_at
        - updated_at
        - flow_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
  - role: platformAdmin
    permission:
      columns:
        - user_id
        - created_at
        - updated_at
        - flow_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
  - role: teamEditor
    permission:
      columns:
        - user_id
        - created_at
        - updated_at
        - flow_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
delete_permissions:
  - role: platformAdmin
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
  - role: teamEditor
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
