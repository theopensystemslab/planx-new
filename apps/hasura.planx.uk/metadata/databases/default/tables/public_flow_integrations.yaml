table:
  name: flow_integrations
  schema: public
object_relationships:
  - name: flow
    using:
      foreign_key_constraint_on: flow_id
  - name: submission_integration
    using:
      manual_configuration:
        column_mapping:
          email_id: id
        insertion_order: null
        remote_table:
          name: submission_integrations
          schema: public
  - name: team
    using:
      manual_configuration:
        column_mapping:
          team_id: id
        insertion_order: null
        remote_table:
          name: teams
          schema: public
insert_permissions:
  - role: demoUser
    permission:
      check:
        team_id:
          _eq: 32
      columns:
        - team_id
        - email_id
        - flow_id
    comment: ""
  - role: platformAdmin
    permission:
      check: {}
      columns:
        - email_id
        - flow_id
        - team_id
    comment: ""
  - role: teamEditor
    permission:
      check:
        team:
          members:
            _and:
              - user_id:
                  _eq: x-hasura-user-id
              - role:
                  _eq: teamEditor
      columns:
        - email_id
        - flow_id
        - team_id
    comment: ""
select_permissions:
  - role: api
    permission:
      columns:
        - email_id
        - flow_id
      filter: {}
    comment: ""
  - role: demoUser
    permission:
      columns:
        - team_id
        - email_id
        - flow_id
      filter:
        team_id:
          _eq: 32
    comment: ""
  - role: platformAdmin
    permission:
      columns:
        - email_id
        - flow_id
        - team_id
      filter: {}
    comment: ""
  - role: public
    permission:
      columns: []
      filter: {}
    comment: ""
  - role: teamEditor
    permission:
      columns:
        - email_id
        - flow_id
        - team_id
      filter: {}
    comment: ""
update_permissions:
  - role: demoUser
    permission:
      columns:
        - email_id
      filter:
        team_id:
          _eq: 32
      check: {}
    comment: ""
  - role: platformAdmin
    permission:
      columns:
        - email_id
      filter: {}
      check: null
    comment: ""
  - role: teamEditor
    permission:
      columns:
        - email_id
      filter:
        team:
          members:
            _and:
              - user_id:
                  _eq: x-hasura-user-id
              - role:
                  _eq: teamEditor
      check: null
    comment: ""
delete_permissions:
  - role: demoUser
    permission:
      filter:
        team_id:
          _eq: 32
    comment: ""
  - role: platformAdmin
    permission:
      filter: {}
    comment: ""
  - role: teamEditor
    permission:
      filter:
        team:
          members:
            _and:
              - user_id:
                  _eq: x-hasura-user-id
              - role:
                  _eq: teamEditor
    comment: ""
