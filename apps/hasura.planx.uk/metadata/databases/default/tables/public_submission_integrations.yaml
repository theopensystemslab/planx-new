table:
  name: submission_integrations
  schema: public
object_relationships:
  - name: team
    using:
      manual_configuration:
        column_mapping:
          team_id: id
        insertion_order: null
        remote_table:
          name: teams
          schema: public
  - name: team_setting
    using:
      foreign_key_constraint_on: team_id
insert_permissions:
  - role: platformAdmin
    permission:
      check: {}
      columns:
        - default_email
        - id
        - submission_email
        - team_id
    comment: ""
  - role: teamEditor
    permission:
      check:
        team:
          members:
            _and:
              - user_id:
                  _eq: x-hasura-user-id
              - role:
                  _eq: teamEditor
      columns:
        - default_email
        - id
        - submission_email
        - team_id
    comment: ""
select_permissions:
  - role: api
    permission:
      columns:
        - default_email
        - id
        - submission_email
        - team_id
      filter: {}
    comment: ""
  - role: platformAdmin
    permission:
      columns:
        - default_email
        - id
        - submission_email
        - team_id
      filter: {}
    comment: ""
  - role: public
    permission:
      columns: []
      filter: {}
    comment: ""
  - role: teamEditor
    permission:
      columns:
        - default_email
        - id
        - submission_email
        - team_id
      filter:
        team:
          members:
            _and:
              - user_id:
                  _eq: x-hasura-user-id
              - role:
                  _eq: teamEditor
    comment: ""
update_permissions:
  - role: platformAdmin
    permission:
      columns:
        - default_email
        - id
        - submission_email
      filter: {}
      check: null
    comment: ""
  - role: teamEditor
    permission:
      columns:
        - default_email
        - id
        - submission_email
      filter: {}
      check: null
    comment: ""
delete_permissions:
  - role: platformAdmin
    permission:
      filter:
        default_email:
          _eq: false
    comment: ""
  - role: teamEditor
    permission:
      filter:
        default_email:
          _eq: false
    comment: ""
