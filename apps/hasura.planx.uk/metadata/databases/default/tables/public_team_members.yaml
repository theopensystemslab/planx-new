table:
  name: team_members
  schema: public
object_relationships:
  - name: team
    using:
      foreign_key_constraint_on: team_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: platformAdmin
    permission:
      check: {}
      columns:
        - team_id
        - user_id
        - role
        - id
  - role: teamAdmin
    permission:
      check:
        team:
          members:
            _and:
              - user_id:
                  _eq: X-Hasura-User-Id
              - role:
                  _eq: teamAdmin
      columns:
        - team_id
        - user_id
        - role
        - id
    comment: teamAdmins can assign other teamAdmins to their team
select_permissions:
  - role: analyst
    permission:
      columns:
        - team_id
        - user_id
        - role
        - id
      filter: {}
    comment: ""
  - role: api
    permission:
      columns:
        - team_id
        - user_id
        - role
        - id
      filter: {}
  - role: platformAdmin
    permission:
      columns:
        - team_id
        - user_id
        - role
        - id
      filter: {}
  - role: teamAdmin
    permission:
      columns:
        - team_id
        - user_id
        - role
        - id
      filter: {}
    comment: ""
  - role: teamEditor
    permission:
      columns:
        - team_id
        - user_id
        - role
        - id
      filter: {}
update_permissions:
  - role: platformAdmin
    permission:
      columns:
        - team_id
        - user_id
        - role
        - id
      filter: {}
      check: {}
  - role: teamAdmin
    permission:
      columns:
        - role
      filter:
        team:
          members:
            _and:
              - user_id:
                  _eq: X-Hasura-User-Id
              - role:
                  _eq: teamAdmin
      check: null
    comment: ""
delete_permissions:
  - role: platformAdmin
    permission:
      filter: {}
  - role: teamAdmin
    permission:
      filter:
        team:
          members:
            _and:
              - user_id:
                  _eq: X-Hasura-User-Id
              - role:
                  _eq: teamAdmin
    comment: ""
