table:
  name: team_members
  schema: public
object_relationships:
  - name: team
    using:
      foreign_key_constraint_on: team_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: platformAdmin
    permission:
      check: {}
      columns:
        - team_id
        - user_id
        - role
        - id
  - role: teamAdmin
    permission:
      check:
        _and:
          - team:
              members:
                _and:
                  - user_id:
                      _eq: X-Hasura-User-Id
                  - _or:
                      - role:
                          _eq: teamEditor
                      - role:
                          _eq: teamAdmin
      columns:
        - team_id
        - user_id
        - role
        - id
    comment: ""
  - role: teamEditor
    permission:
      check:
        _and:
          - team:
              members:
                _and:
                  - user_id:
                      _eq: X-Hasura-User-Id
                  - role:
                      _eq: teamEditor
          - role:
              _eq: teamEditor
      columns:
        - team_id
        - user_id
        - role
        - id
    comment: teamEditors can assign other teamEditors to their team
select_permissions:
  - role: analyst
    permission:
      columns:
        - team_id
        - user_id
        - role
        - id
      filter: {}
    comment: ""
  - role: api
    permission:
      columns:
        - team_id
        - user_id
        - role
        - id
      filter: {}
  - role: platformAdmin
    permission:
      columns:
        - team_id
        - user_id
        - role
        - id
      filter: {}
  - role: teamEditor
    permission:
      columns:
        - team_id
        - user_id
        - role
        - id
      filter: {}
update_permissions:
  - role: platformAdmin
    permission:
      columns:
        - team_id
        - user_id
        - role
        - id
      filter: {}
      check: {}
  - role: teamAdmin
    permission:
      columns:
        - role
      filter:
        _and:
          - team:
              members:
                _and:
                  - user_id:
                      _eq: X-Hasura-User-Id
                  - role:
                      _eq: teamAdmin
          - _or:
              - role:
                  _eq: teamEditor
              - role:
                  _eq: teamAdmin
      check: null
    comment: ""
delete_permissions:
  - role: platformAdmin
    permission:
      filter: {}
  - role: teamAdmin
    permission:
      filter:
        _and:
          - team:
              members:
                _and:
                  - user_id:
                      _eq: X-Hasura-User-Id
                  - _or:
                      - role:
                          _eq: teamEditor
                      - role:
                          _eq: teamAdmin
    comment: ""
  - role: teamEditor
    permission:
      filter:
        _and:
          - team:
              members:
                _and:
                  - user_id:
                      _eq: X-Hasura-User-Id
                  - role:
                      _eq: teamEditor
          - role:
              _eq: teamEditor
    comment: teamEditors can revoke membership of other teamEditors in their team
