table:
  name: published_flows
  schema: public
object_relationships:
  - name: flow
    using:
      foreign_key_constraint_on: flow_id
  - name: user
    using:
      foreign_key_constraint_on: publisher_id
insert_permissions:
  - role: api
    permission:
      check: {}
      columns:
        - created_at
        - data
        - flow_id
        - has_pay_component
        - has_sections
        - has_send_component
        - id
        - publisher_id
        - service_charge_enabled
        - summary
  - role: platformAdmin
    permission:
      check: {}
      columns:
        - created_at
        - data
        - flow_id
        - has_pay_component
        - has_sections
        - has_send_component
        - id
        - publisher_id
        - service_charge_enabled
        - summary
  - role: teamEditor
    permission:
      check:
        flow:
          team:
            members:
              _and:
                - user_id:
                    _eq: x-hasura-user-id
                - role:
                    _eq: teamEditor
      columns:
        - created_at
        - data
        - flow_id
        - has_pay_component
        - has_sections
        - has_send_component
        - id
        - publisher_id
        - service_charge_enabled
        - summary
select_permissions:
  - role: analyst
    permission:
      columns:
        - has_pay_component
        - has_sections
        - has_send_component
        - service_charge_enabled
        - id
        - publisher_id
        - summary
        - created_at
        - flow_id
        - data
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: api
    permission:
      columns:
        - created_at
        - data
        - flow_id
        - has_pay_component
        - has_sections
        - has_send_component
        - id
        - publisher_id
        - service_charge_enabled
        - summary
      filter: {}
      allow_aggregations: true
  - role: platformAdmin
    permission:
      columns:
        - created_at
        - data
        - flow_id
        - has_pay_component
        - has_sections
        - has_send_component
        - id
        - publisher_id
        - service_charge_enabled
        - summary
      filter: {}
      allow_aggregations: true
  - role: public
    permission:
      columns:
        - created_at
        - data
        - flow_id
        - has_pay_component
        - has_sections
        - has_send_component
        - id
        - publisher_id
        - service_charge_enabled
        - summary
      filter: {}
      allow_aggregations: true
  - role: teamEditor
    permission:
      columns:
        - created_at
        - data
        - flow_id
        - has_pay_component
        - has_sections
        - has_send_component
        - id
        - publisher_id
        - service_charge_enabled
        - summary
      filter: {}
      allow_aggregations: true
