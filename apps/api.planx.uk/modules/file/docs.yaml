openapi: 3.1.0
info:
  title: Plan✕ API
  version: 0.1.0
tags:
  - name: file
    description: Endpoints for uploading, downloading and deleting files
components:
  parameters:
    fileKey:
      in: path
      name: fileKey
      type: string
      required: true
    fileName:
      in: path
      name: fileName
      type: string
      required: true
  schemas:
    UploadFile:
      type: object
      properties:
        filename:
          type: string
          required: true
        file:
          type: string
          format: binary
  responses:
    UploadFile:
      type: object
      properties:
        fileType:
          oneOf:
            - type: string
            - type: "null"
        fileUrl:
          type: string
    UnsupportedFileType:
      description: The uploaded file has an unsupported MIME type or extension
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Unsupported file type. Mimetype: text/plain. Extension: .txt"
    FileTooLarge:
      description: The uploaded file exceeds the 30MB size limit
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "File too large"
    DownloadFile:
      description: Successful response
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
    MissingFile:
      description: Missing file - this file has been deleted by our content moderation system (Scanii)
      content:
        application/json:
          schema:
            type: "object"
            properties:
              error:
                type: "string"
                example: "Missing file"
paths:
  /file/private/upload:
    post:
      tags: ["file"]
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadFile"
      responses:
        "200":
          $ref: "#/components/responses/UploadFile"
        "413":
          $ref: "#/components/responses/FileTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedFileType"
        "500":
          $ref: "#/components/responses/ErrorMessage"
  /file/public/upload:
    post:
      tags: ["file"]
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadFile"
      responses:
        "200":
          $ref: "#/components/responses/UploadFile"
        "413":
          $ref: "#/components/responses/FileTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedFileType"
        "500":
          $ref: "#/components/responses/ErrorMessage"
  /file/public/{fileKey}/{fileName}:
    get:
      tags: ["file"]
      parameters:
        - $ref: "#/components/parameters/fileKey"
        - $ref: "#/components/parameters/fileName"
      responses:
        "200":
          $ref: "#/components/responses/DownloadFile"
        "404":
          $ref: "#/components/responses/MissingFile"
        "500":
          $ref: "#/components/responses/ErrorMessage"
    delete:
      tags: ["file"]
      parameters:
        - $ref: "#/components/parameters/fileKey"
        - $ref: "#/components/parameters/fileName"
      security:
        - bearerAuth: []
      responses:
        "204":
          $ref: "#/components/responses/UploadFile"
        "404":
          $ref: "#/components/responses/MissingFile"
        "500":
          $ref: "#/components/responses/ErrorMessage"
  /file/private/{fileKey}/{fileName}:
    get:
      tags: ["file"]
      parameters:
        - $ref: "#/components/parameters/fileKey"
        - $ref: "#/components/parameters/fileName"
      security:
        - fileAPIKeyAuth: []
      responses:
        "204":
          description: Successful deletion
        "404":
          $ref: "#/components/responses/MissingFile"
        "500":
          $ref: "#/components/responses/ErrorMessage"
