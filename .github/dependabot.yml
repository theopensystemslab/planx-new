# NB. this file configures dependabot's approach to general version updates of dependencies
# fixes for vulnerabilities/CVEs (i.e. security updates) are handled automatically as per repo settings
version: 2

# TODO: increase use of groups to collect version upgrades in logical fashion and reduce PRs
multi-ecosystem-groups:
  # Sync versions of ShareDB between the Editor and ShareDB service
  sharedb-sync:
    schedule:
      interval: "monthly"
    labels: ["sharedb", "pnpm"]

updates:
  # Root
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["pnpm"]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # Editor
  - package-ecosystem: "npm"
    directory: "/apps/editor.planx.uk"
    schedule:
      interval: "monthly"
    labels: ["editor", "pnpm"]
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-patch", "version-update:semver-minor"]
      - dependency-name: "sharedb" # Ignore sharedb here, handled by sharedb-sync group
    groups:
      tiptap:
        patterns: ["@tiptap/*"]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # Editor - sharedb-sync group
  - package-ecosystem: "npm"
    directory: "/apps/editor.planx.uk"
    patterns: ["sharedb"]
    multi-ecosystem-group: "sharedb-sync"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # localplanning.services
  - package-ecosystem: "npm"
    directory: "/apps/localplanning.services"
    schedule:
      interval: "monthly"
    labels: ["lps", "pnpm"]
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-patch", "version-update:semver-minor"]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # Hasura
  - package-ecosystem: "npm"
    directory: "/apps/hasura.planx.uk"
    schedule:
      interval: "monthly"
    labels: ["hasura", "pnpm"]
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-patch", "version-update:semver-minor"]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: "docker"
    directory: "/apps/hasura.planx.uk"
    schedule:
      interval: "monthly"
    labels: ["hasura", "docker"]
    open-pull-requests-limit: 1

  - package-ecosystem: "docker"
    directory: "/apps/hasura.planx.uk/proxy"
    schedule:
      interval: "monthly"
    labels: ["hasura", "caddy", "docker"]
    open-pull-requests-limit: 1

  - package-ecosystem: "npm"
    directory: "/apps/hasura.planx.uk/tests"
    schedule:
      interval: "monthly"
    labels: ["hasura", "tests", "pnpm"]
    commit-message:
      prefix: "[skip pizza] "
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-patch", "version-update:semver-minor"]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # ShareDB
  - package-ecosystem: "npm"
    directory: "/apps/sharedb.planx.uk"
    schedule:
      interval: "monthly"
    labels: ["sharedb", "pnpm"]
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-patch", "version-update:semver-minor"]
      - dependency-name: "sharedb" # Ignore sharedb here, handled by sharedb-sync group
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # ShareDB - sharedb-sync group
  - package-ecosystem: "npm"
    directory: "/apps/sharedb.planx.uk"
    patterns: ["sharedb"]
    multi-ecosystem-group: "sharedb-sync"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: "docker"
    directory: "/apps/sharedb.planx.uk"
    schedule:
      interval: "monthly"
    labels: ["sharedb", "docker"]
    open-pull-requests-limit: 1

  # API
  - package-ecosystem: "npm"
    directory: "/apps/api.planx.uk"
    schedule:
      interval: "monthly"
    labels: ["api", "pnpm"]
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-patch", "version-update:semver-minor"]
    groups:
      vitest:
        patterns: ["vitest", "@vitest/coverage-istanbul", "@vitest/ui"]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: "docker"
    directory: "/apps/api.planx.uk"
    schedule:
      interval: "monthly"
    labels: ["api", "docker"]
    open-pull-requests-limit: 1

  # E2E tests
  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "monthly"
    labels: ["e2e", "tests", "pnpm"]
    commit-message:
      prefix: "[skip pizza] "
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-patch", "version-update:semver-minor"]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # Caddy container (reverse proxy for pizzas)
  - package-ecosystem: "docker"
    directory: "/ci/caddy"
    schedule:
      interval: "monthly"
    labels: ["ci", "caddy", "docker"]
    open-pull-requests-limit: 1

  # custom postgres container
  - package-ecosystem: "docker"
    directory: "/apps/postgres"
    schedule:
      interval: "monthly"
    labels: ["ci", "postgres", "docker"]
    open-pull-requests-limit: 1

  # Infrastructure (pnpm workspace so we only reference the root)
  # NB. this config may serve as a useful reference when we push monorepo setup at project root
  - package-ecosystem: "npm"
    directory: "/infrastructure"
    schedule:
      interval: "monthly"
    labels: ["infra", "pnpm"]
    groups:
      # group pulumi updates together to reduce noise
      pulumi:
        patterns: ["@pulumi/*"]
    # handle all @types/node bumps (bar patches) manually, to keep alignment with node version (see .nvmrc)
    ignore:
      - dependency-name: "@types/node"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # GitHub actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["ci", "github-actions"]
