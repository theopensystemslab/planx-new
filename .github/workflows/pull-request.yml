name: Pull Request

permissions:
  pull-requests: write
  packages: read

on:
  pull_request:
    types:
      - opened
      - synchronize
    branches-ignore:
      - production

env:
  DOMAIN: planx.pizza
  FULL_DOMAIN: ${{ github.event.number }}.planx.pizza
  PULLREQUEST_ID: ${{ github.event.number }}
  EDITOR_DIRECTORY: apps/editor.planx.uk
  LOCALPLANNING_SERVICES_DIRECTORY: apps/localplanning.services
  API_DIRECTORY: apps/api.planx.uk
  HASURA_DIRECTORY: apps/hasura.planx.uk
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  changes:
    name: Check file changes
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      e2e: ${{ steps.filter.outputs.e2e }}
      editor: ${{ steps.filter.outputs.editor }}
      hasura: ${{ steps.filter.outputs.hasura }}
      infrastructure: ${{ steps.filter.outputs.infrastructure }}
      sharedb: ${{ steps.filter.outputs.sharedb }}
      localplanning: ${{ steps.filter.outputs.localplanning }}
      pnpmworkspace: ${{ steps.filter.outputs.pnpmworkspace }}
      commit: ${{ steps.commit.outputs.commit }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Get commit message
        id: commit
        run: |
          echo "commit=$(git show -s --format=%s)" >> $GITHUB_OUTPUT
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/api.planx.uk/**'
            e2e:
              - 'e2e/**'
            hasura:
              - 'apps/hasura.planx.uk/**'
            infrastructure:
              - 'infrastructure/**'
            editor:
              - 'apps/editor.planx.uk/**'
            sharedb:
              - 'apps/sharedb.planx.uk/**'
            localplanning:
              - 'apps/localplanning.services/**'
            pnpmworkspace:
              - 'pnpm-workspace.yaml'
            

  verify:
    name: Verify (typecheck + lint)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Node and PNPM
        uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: pnpm turbo run typecheck lint --affected
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha }}

  integration_tests:
    name: Run Integration tests
    runs-on: ubuntu-24.04
    needs: [changes]
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.e2e == 'true' || needs.changes.outputs.editor == 'true' || needs.changes.outputs.sharedb == 'true' || needs.changes.outputs.hasura == 'true' || needs.changes.outputs.pnpmworkspace == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pizza-env
        with:
          aws-access-key-id: ${{ secrets.PIZZA_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PIZZA_AWS_SECRET_ACCESS_KEY }}
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start test containers
        run: ./scripts/start-containers-for-tests.sh
      - name: Postgres Tests
        run: ./${{ env.HASURA_DIRECTORY }}/run-postgres-tests.sh
      - run: pnpm i -g hasura-cli@2.36.1
      - name: Hasura Tests
        run: pnpm test
        working-directory: ${{ env.HASURA_DIRECTORY }}/tests

  api_tests:
    name: Run API Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [changes]
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.pnpmworkspace == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pizza-env
        with:
          aws-access-key-id: ${{ secrets.PIZZA_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PIZZA_AWS_SECRET_ACCESS_KEY }}
      - name: Setup Node and PNPM
        uses: ./.github/actions/setup-node-pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run API Tests
        run: pnpm test
        working-directory: ${{ env.API_DIRECTORY }}

  test_react:
    name: Run React Tests
    runs-on: ubuntu-24.04
    needs: [changes]
    if: ${{ needs.changes.outputs.editor == 'true' || needs.changes.outputs.pnpmworkspace == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pizza-env
        with:
          aws-access-key-id: ${{ secrets.PIZZA_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PIZZA_AWS_SECRET_ACCESS_KEY }}
      - name: Setup Node and PNPM
        uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: pnpm turbo run build --filter=editor.planx.uk
      - run: pnpm test:silent --retry=1
        working-directory: ${{ env.EDITOR_DIRECTORY }}

  build_localplanning_services:
    name: Build localplanning.services
    runs-on: ubuntu-24.04
    continue-on-error: true
    needs: [changes]
    if: "${{ !contains(needs.changes.outputs.commit, '[skip pizza]') }}"
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node and PNPM
        uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - run: pnpm turbo run build --filter=localplanning.services
        env:
          BUILD_MODE: pizza
          SITE_URL: https://localplanning.${{ env.FULL_DOMAIN }}
          ROOT_DOMAIN: ${{ env.FULL_DOMAIN }}
      - name: Upload localplanning.services build artifact
        uses: actions/upload-artifact@v7
        with:
          name: localplanning_services_build
          path: ./${{ env.LOCALPLANNING_SERVICES_DIRECTORY }}/dist
          if-no-files-found: error

  build_planx_frontend:
    name: Build PlanX frontend
    runs-on: ubuntu-24.04
    needs: [changes]
    if: "${{ !contains(needs.changes.outputs.commit, '[skip pizza]') }}"
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node and PNPM
        uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - name: Build editor + Storybook
        run: pnpm turbo run build build-storybook --filter=editor.planx.uk
        env:
          VITE_APP_AIRBRAKE_PROJECT_ID: ${{ secrets.AIRBRAKE_PROJECT_ID }}
          VITE_APP_AIRBRAKE_PROJECT_KEY: ${{ secrets.AIRBRAKE_PROJECT_KEY }}
          VITE_APP_API_URL: https://api.${{ env.FULL_DOMAIN }}
          VITE_APP_HASURA_URL: https://hasura.${{ env.FULL_DOMAIN }}/v1/graphql
          VITE_APP_HASURA_WEBSOCKET: wss://hasura.${{ env.FULL_DOMAIN }}/v1/graphql
          VITE_APP_MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          VITE_APP_SHAREDB_URL: wss://sharedb.${{ env.FULL_DOMAIN }}
          # needed because there's no API to change google/microsoft's allowed redirect URIs
          VITE_APP_GOOGLE_OAUTH_OVERRIDE: https://api.editor.planx.dev
          VITE_APP_MICROSOFT_OAUTH_OVERRIDE: https://api.editor.planx.dev
          VITE_APP_ENV: pizza
      - name: Upload source maps to Airbrake
        working-directory: ${{ env.EDITOR_DIRECTORY }}
        env:
          AB_PROJECT_ID: ${{ secrets.AIRBRAKE_PROJECT_ID }}
          AB_PROJECT_KEY: ${{ secrets.AIRBRAKE_PROJECT_KEY }}
        run: |
          for mapfile in build/assets/*.map; do
            jsname=$(basename "${mapfile%.map}")
            curl -sS --fail -X POST \
              "https://api.airbrake.io/api/v4/projects/${AB_PROJECT_ID}/sourcemaps" \
              -H "Authorization: Bearer ${AB_PROJECT_KEY}" \
              -F "file=@${mapfile}" \
              -F "name=https://${{ env.FULL_DOMAIN }}/assets/${jsname}"
          done
      - name: Upload PlanX frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: planx_frontend_build
          path: |
            ./${{ env.EDITOR_DIRECTORY }}/build
            !./${{ env.EDITOR_DIRECTORY }}/build/**/*.map
          if-no-files-found: error

  pulumi_preview:
    name: Run Pulumi Preview
    runs-on: ubuntu-24.04
    needs: [changes, build_planx_frontend, build_localplanning_services]
    if: ${{ needs.changes.outputs.infrastructure == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          aws-region: eu-west-2
          aws-secret-access-key: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
      - name: Setup Node and PNPM
        uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile --filter "@planx/infrastructure-application..."
      - name: Download PlanX frontend build artifact
        uses: actions/download-artifact@v8
        with:
          name: planx_frontend_build
          path: ./${{ env.EDITOR_DIRECTORY }}/build
      - name: Download localplanning.services build artifact
        uses: actions/download-artifact@v8
        with:
          name: localplanning_services_build
          path: ./${{ env.LOCALPLANNING_SERVICES_DIRECTORY }}/dist
      - uses: pulumi/actions@v7
        with:
          command: preview
          stack-name: staging
          work-dir: infrastructure/application
          edit-pr-comment: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  hasura-change-summary:
    name: Generate Hasura Change Summary
    runs-on: ubuntu-24.04
    needs: [changes]
    if: ${{ needs.changes.outputs.hasura == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: Fieldguide/action-hasura-change-summary@v4
        id: hasura-change
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          hasura_endpoint: https://hasura.${{ env.FULL_DOMAIN }}
          project_dir: ./${{ env.HASURA_DIRECTORY }}
      - uses: marocchino/sticky-pull-request-comment@v3
        if: ${{steps.hasura-change.outputs.change_html != ''}}
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: hasura-change-summary
          message: ${{ steps.hasura-change.outputs.change_html }}
      - uses: marocchino/sticky-pull-request-comment@v3
        if: ${{ steps.hasura-change.outputs.change_html == '' }}
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: hasura-change-summary
          delete: true

  create_or_update_vultr_instance:
    name: Upsert Vultr Instance
    needs: [changes, build_planx_frontend, build_localplanning_services]
    runs-on: ubuntu-24.04
    if: "${{ success() && !contains(needs.changes.outputs.commit, '[skip pizza]') }}"
    steps:
      - name: Create Pizza (if it doesn't exist)
        id: create
        uses: theopensystemslab/vultr-action@v3.0
        with:
          action: create
          api_key: ${{ secrets.VULTR_API_KEY }}
          domain: ${{ env.DOMAIN }}
          os_type: alpine
          plan: vc2-1c-1gb
          pull_request_id: ${{ env.PULLREQUEST_ID }}
          region: lhr
          tag: pullrequest
          ssh_key_ids: ${{ secrets.VULTR_SSH_KEY_IDS }}

      # CREATE STEPS

      - if: steps.create.outputs.ip_address != null
        name: Create commands
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.FULL_DOMAIN }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            apk update
            apk add docker
            addgroup root docker
            rc-update add docker default
            service docker start
            apk add docker-cli-compose
            docker login ${{ secrets.VULTR_CR_URN }} -u ${{ secrets.VULTR_CR_ID }} -p ${{ secrets.VULTR_CR_API_KEY }}

            apk add git
            git clone "${{ secrets.AUTHENTICATED_REPO_URL }}"
            cd planx-new
            git fetch origin "pull/${{ env.PULLREQUEST_ID }}/head" && git checkout FETCH_HEAD

            apk add aws-cli
            export AWS_ACCESS_KEY_ID=${{ secrets.PIZZA_AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.PIZZA_AWS_SECRET_ACCESS_KEY }}
            export AWS_REGION=eu-west-2

            CI=true ./scripts/pull-secrets.sh

            echo -e "\nROOT_DOMAIN=${{ env.FULL_DOMAIN }}\n" > .env.temp
            cat .env .env.temp .env.staging > .env.pizza

            SSH_PASSWORD=${{ secrets.SSH_PASSWORD }} VULTR_CR_URN=${{ secrets.VULTR_CR_URN }} ./scripts/pullrequest/create.sh

      # UPDATE STEPS

      - if: steps.create.outputs.ip_address == null
        name: Update commands
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.FULL_DOMAIN }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          # TODO: some of below script might be superfluous for server update (rather than create)
          script: |
            apk update
            apk add docker
            addgroup root docker
            rc-update add docker default
            service docker start
            apk add docker-cli-compose
            docker login ${{ secrets.VULTR_CR_URN }} -u ${{ secrets.VULTR_CR_ID }} -p ${{ secrets.VULTR_CR_API_KEY }}

            apk add git
            git clone "${{ secrets.AUTHENTICATED_REPO_URL }}"
            cd planx-new
            git add . && git stash
            git fetch origin "pull/${{ env.PULLREQUEST_ID }}/head" && git checkout FETCH_HEAD

            apk add aws-cli
            export AWS_ACCESS_KEY_ID=${{ secrets.PIZZA_AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.PIZZA_AWS_SECRET_ACCESS_KEY }}
            export AWS_REGION=eu-west-2

            CI=true ./scripts/pull-secrets.sh

            echo -e "\nROOT_DOMAIN=${{ env.FULL_DOMAIN }}\n" > .env.temp
            cat .env .env.temp .env.staging > .env.pizza

            VULTR_CR_URN=${{ secrets.VULTR_CR_URN }} ./scripts/pullrequest/update.sh

      # CREATE & UPDATE STEPS

      - uses: actions/checkout@v7
      - name: Download React build assets
        uses: actions/download-artifact@v8
        with:
          name: planx_frontend_build
          path: ./${{ env.EDITOR_DIRECTORY }}/build
      - name: upload built editor
        uses: appleboy/scp-action@v1
        with:
          host: ${{ env.FULL_DOMAIN }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./${{ env.EDITOR_DIRECTORY }}/build"
          target: "planx-new/"
          overwrite: true

      - name: Download localplanning.services build artifact
        uses: actions/download-artifact@v8
        with:
          name: localplanning_services_build
          path: ./${{ env.LOCALPLANNING_SERVICES_DIRECTORY }}/dist

      - name: upload built localplanning.services
        continue-on-error: true
        uses: appleboy/scp-action@v1
        with:
          host: ${{ env.FULL_DOMAIN }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./${{ env.LOCALPLANNING_SERVICES_DIRECTORY }}/dist"
          target: "planx-new/"
          overwrite: true

      - uses: marocchino/sticky-pull-request-comment@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: vultr
          message: |
            ## Pizza

            Deployed ${{ github.sha }} to https://${{ env.FULL_DOMAIN }}.

            Useful links:
              - [Editor](https://${{ env.FULL_DOMAIN }})
              - [Storybook](https://storybook.${{ env.FULL_DOMAIN }})
              - [Hasura](https://hasura.${{ env.FULL_DOMAIN }})
              - [API](https://api.${{ env.FULL_DOMAIN }}/docs)
              - [ShareDB](https://sharedb.${{ env.FULL_DOMAIN }})
              - [LocalPlanning.services](https://localplanning.${{ env.FULL_DOMAIN }})

  healthcheck:
    name: Run Healthcheck on Pizza Services
    needs: [create_or_update_vultr_instance]
    runs-on: ubuntu-24.04
    steps:
      - name: Wait for caddy reverse-proxy server to provision TLS certs for pizza
        run: bash -c "sleep 180s"
      - name: API healthcheck
        run: |
          timeout 150s bash -c "until curl --fail https://api.${{ env.FULL_DOMAIN }}; do sleep 1; done"

      - name: Hasura healthcheck
        run: |
          timeout 150s bash -c "until curl --fail https://hasura.${{ env.FULL_DOMAIN }}/healthz; do sleep 1; done"

      - name: Editor healthcheck
        run: |
          timeout 150s bash -c "until curl --fail https://${{ env.FULL_DOMAIN }}; do sleep 1; done"

  end_to_end_tests:
    name: E2E tests
    runs-on: ubuntu-24.04
    needs: [changes]
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.e2e == 'true' || needs.changes.outputs.editor == 'true' || needs.changes.outputs.sharedb == 'true' || needs.changes.outputs.hasura == 'true' || needs.changes.outputs.pnpmworkspace == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pizza-env
        with:
          aws-access-key-id: ${{ secrets.PIZZA_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PIZZA_AWS_SECRET_ACCESS_KEY }}
      - name: Setup Node and PNPM
        uses: ./.github/actions/setup-node-pnpm
      - name: PNPM Install
        run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      - name: Install Playwright Dependencies
        run: pnpm playwright install --with-deps chromium
        working-directory: e2e/tests/ui-driven
      - name: Start test containers
        run: ./scripts/start-containers-for-tests.sh
      - name: Build editor (test mode)
        run: pnpm turbo run build --filter=editor.planx.uk
        env:
          VITE_APP_ENV: test
      - name: End-to-end Tests
        run: pnpm test
        working-directory: e2e
      - name: Archive Playwright Test Results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/tests/ui-driven/test-results/
          retention-days: 3
