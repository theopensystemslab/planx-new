name: Build PlanX Frontend

on:
  workflow_call:
    inputs:
      environment:
        description: Deployment environment name (e.g. staging, production)
        required: true
        type: string
      vite-api-url:
        description: Value for VITE_APP_API_URL
        required: true
        type: string
      vite-hasura-url:
        description: Value for VITE_APP_HASURA_URL
        required: true
        type: string
      vite-hasura-websocket:
        description: Value for VITE_APP_HASURA_WEBSOCKET
        required: true
        type: string
      vite-sharedb-url:
        description: Value for VITE_APP_SHAREDB_URL
        required: true
        type: string
      vite-app-url:
        description: Public base URL of the deployed frontend (e.g. https://editor.planx.uk)
        required: true
        type: string
      editor-directory:
        description: Path to the editor app directory
        required: false
        type: string
        default: apps/editor.planx.uk

permissions:
  contents: read

jobs:
  build_planx_frontend:
    name: Build PlanX frontend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: ${{ inputs.editor-directory }}
      - run: pnpm build
        working-directory: ${{ inputs.editor-directory }}
        env:
          VITE_APP_AIRBRAKE_PROJECT_ID: ${{ secrets.AIRBRAKE_PROJECT_ID }}
          VITE_APP_AIRBRAKE_PROJECT_KEY: ${{ secrets.AIRBRAKE_PROJECT_KEY }}
          VITE_APP_API_URL: ${{ inputs.vite-api-url }}
          VITE_APP_ENV: ${{ inputs.environment }}
          VITE_APP_HASURA_URL: ${{ inputs.vite-hasura-url }}
          VITE_APP_HASURA_WEBSOCKET: ${{ inputs.vite-hasura-websocket }}
          VITE_APP_MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          VITE_APP_SHAREDB_URL: ${{ inputs.vite-sharedb-url }}
      - name: Upload source maps to Airbrake
        working-directory: ${{ inputs.editor-directory }}
        env:
          AIRBRAKE_PROJECT_ID: ${{ secrets.AIRBRAKE_PROJECT_ID }}
          AIRBRAKE_PROJECT_KEY: ${{ secrets.AIRBRAKE_PROJECT_KEY }}
        run: |
          for mapfile in build/assets/*.map; do
            jsname=$(basename "${mapfile%.map}")
            curl -sS --fail -X POST \
              "https://api.airbrake.io/api/v4/projects/${AIRBRAKE_PROJECT_ID}/sourcemaps" \
              -H "Authorization: Bearer ${AIRBRAKE_PROJECT_KEY}" \
              -F "file=@${mapfile}" \
              -F "name=${{ inputs.vite-app-url }}/assets/${jsname}"
          done
      - name: Upload PlanX frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: planx_frontend_build
          path: |
            ./${{ inputs.editor-directory }}/build
            !./${{ inputs.editor-directory }}/build/**/*.map
          if-no-files-found: error
