name: Regression Tests

permissions: read-all

on:
  schedule:
    # Runs every morning at 06:06 (https://crontab.guru/#06_6_*_*_*)
    - cron: "06 6 * * *"
  workflow_dispatch:
    inputs:
      comment_id:
        description: Comment ID to update with pass/fail result
        required: false
        type: string

env:
  EDITOR_DIRECTORY: apps/editor.planx.uk
  API_DIRECTORY: apps/api.planx.uk
  HASURA_DIRECTORY: apps/hasura.planx.uk

jobs:
  integration_tests:
    name: Run Integration tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pizza-env
        with:
          aws-access-key-id: ${{ secrets.PIZZA_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PIZZA_AWS_SECRET_ACCESS_KEY }}
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: ${{ env.EDITOR_DIRECTORY }}
      - name: Start test containers
        run: ./scripts/start-containers-for-tests.sh
      - name: Postgres Tests
        run: ./${{ env.HASURA_DIRECTORY }}/run-postgres-tests.sh
      - run: pnpm i -g hasura-cli@2.36.1
      - name: Hasura Tests
        run: pnpm install --frozen-lockfile && pnpm test
        working-directory: ${{ env.HASURA_DIRECTORY }}/tests

  api_tests:
    name: Run API Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pizza-env
        with:
          aws-access-key-id: ${{ secrets.PIZZA_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PIZZA_AWS_SECRET_ACCESS_KEY }}
      - name: Setup Node and PNPM
        uses: ./.github/actions/setup-node-pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ env.API_DIRECTORY }}
      - name: Run API Tests
        run: pnpm install --frozen-lockfile && pnpm check --quiet && pnpm test
        working-directory: ${{ env.API_DIRECTORY }}

  test_react:
    name: Run React Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pizza-env
        with:
          aws-access-key-id: ${{ secrets.PIZZA_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PIZZA_AWS_SECRET_ACCESS_KEY }}
      - name: Setup Node and PNPM
        uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: ${{ env.EDITOR_DIRECTORY }}
      - run: pnpm build
        working-directory: ${{ env.EDITOR_DIRECTORY }}
      - run: pnpm test:silent --retry=1
        working-directory: ${{ env.EDITOR_DIRECTORY }}

  end_to_end_tests:
    name: E2E tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pizza-env
        with:
          aws-access-key-id: ${{ secrets.PIZZA_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PIZZA_AWS_SECRET_ACCESS_KEY }}
      - name: Setup Node and PNPM
        uses: ./.github/actions/setup-node-pnpm
      - name: PNPM Install
        run: pnpm install --frozen-lockfile
        working-directory: e2e
      - name: Code checks
        run: pnpm check
        working-directory: e2e
      - name: Install Playwright Dependencies
        run: pnpm playwright install --with-deps
        working-directory: e2e/tests/ui-driven
      - name: Start test containers
        run: ./scripts/start-containers-for-tests.sh
      - name: End-to-end Tests
        run: pnpm test:regression
        working-directory: e2e
      - name: Archive Playwright Test Results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/tests/ui-driven/test-results/
          retention-days: 3

  notify_pr:
    name: Update PR Comment
    runs-on: ubuntu-24.04
    needs: [integration_tests, api_tests, test_react, end_to_end_tests]
    if: always() && inputs.comment_id != ''
    permissions:
      pull-requests: write
    steps:
      - name: Update PR comment with result
        uses: actions/github-script@v7
        env:
          PASSED: ${{ needs.integration_tests.result == 'success' && needs.api_tests.result == 'success' && needs.test_react.result == 'success' && needs.end_to_end_tests.result == 'success' }}
          COMMENT_ID: ${{ inputs.comment_id }}
        with:
          script: |
            const passed = process.env.PASSED === 'true';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID),
              body: passed
                ? `✅ Regression tests passed - [view run](${runUrl})`
                : `❌ Regression tests failed - [view run](${runUrl})`,
            });

  notify:
    name: Notify On Failure
    runs-on: ubuntu-24.04
    needs:
      - integration_tests
      - api_tests
      - test_react
      - end_to_end_tests
    if: ${{ github.ref == 'refs/heads/main' && failure() }}
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: planx-notifications-internal
          SLACK_USERNAME: Regression Tests
          SLACK_MESSAGE: The regression test suite failed
          SLACK_ICON_EMOJI: ":warning:"
          SLACK_COLOR: "#FF5733"
          SLACK_TITLE: Regression Test Failure
          MSG_MINIMAL: "actions url,commit"
          SLACK_WEBHOOK: ${{ secrets.SLACK_DEPLOYMENT_WEBHOOK }}
